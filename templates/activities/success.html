{% extends 'base.html' %}

{% block title %}Success - EDU-CHOICE{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 text-center">
            <div class="glass-card p-5 animate-fade-in">
                <div class="success-icon-wrapper mb-4">
                    <i class="bi bi-check-circle-fill" style="font-size: 4.5rem; color: #10b981;"></i>
                </div>
                <h1 class="fw-bold mb-3">Submission Successful!</h1>
                <p style="color: var(--text-muted);" class="mb-4">Your activity choice has been recorded successfully. Thank you for your submission!</p>
                <div class="d-flex justify-content-center gap-3 flex-wrap">
                    <a href="{% url 'submit_choice' %}" class="btn btn-premium">
                        <i class="bi bi-plus-circle me-2"></i>Submit Another
                    </a>
                    <a href="{% url 'home' %}" class="btn btn-outline-secondary rounded-pill px-4">
                        <i class="bi bi-house me-2"></i>Go Home
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
